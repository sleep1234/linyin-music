name: netease_music
description: "网易云音乐换源 + 本地VIP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络
  http: ^1.2.1

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path_provider: ^2.1.5

  # 音频播放
  just_audio: ^0.9.42
  audio_service: ^0.18.18

  # UI
  cached_network_image: ^3.4.1

  # 工具
  intl: ^0.20.1
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
